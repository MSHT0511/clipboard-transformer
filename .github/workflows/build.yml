name: Build Executable

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths-ignore:
      - 'tests/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller clipboard-transformer.spec --clean

    - name: Create release package
      run: |
        mkdir release
        copy dist\ClipboardTransformer.exe "release\ClipboardTransformer-build${{ github.run_number }}.exe"
        copy config.json release\
        copy README.md release\
        copy EXE_USAGE.md release\
        copy LICENSE release\

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardTransformer-Windows
        path: release/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/ClipboardTransformer-build${{ github.run_number }}.exe
          release/config.json
          release/README.md
          release/EXE_USAGE.md
          release/LICENSE
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
